<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <h1 class="Titulo">Piedra, Papel o Tijeras</h1>

    <span class="SubTitulo">Elije tu jugada</span>

    <div class="ContainerSpan">
        <span class="SpanJugada">Piedra</span>
        <span class="SpanJugada">Papel</span>
        <span class="SpanJugada">Tijera</span>
    </div>

    <div class="ContainerBtns">
        <button class="Btn" id="piedra"></button>
        <button class="Btn" id="papel"></button>
        <button class="Btn" id="tijera"></button>
    </div>

    <div class="ContainerResultados">
        <h2 class="SubPuntaje">Puntajes</h2>
        <span class="spanResultado" id="resultado"></span>
    </div>
    <span class="FinPartida" id="fin"></span>

    <div class="ContenedorBtnReset" id="containerReset">

    </div>
    <script src="funciones.js"></script>
</body>
</html>
